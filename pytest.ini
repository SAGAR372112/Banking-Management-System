[pytest]
DJANGO_SETTINGS_MODULE = bank_management.settings.development
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
    -v
filterwarnings =
    ignore::DeprecationWarning
