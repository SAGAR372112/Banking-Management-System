# =============================================================================
# Nginx virtual host — Bank Management API
# =============================================================================

upstream django {
    server web:8000;
    keepalive 32;
}

# Redirect HTTP → HTTPS (comment out if not using SSL)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;
    charset utf-8;

    # ---------------------------------------------------------------------------
    # Static files — served directly by Nginx, never hits Django
    # ---------------------------------------------------------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Health check — no rate limiting, no auth
    # ---------------------------------------------------------------------------
    location = /health/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---------------------------------------------------------------------------
    # Auth endpoints — tighter rate limit (10 req/min per IP)
    # ---------------------------------------------------------------------------
    location ~ ^/api/users/(token|register)/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------------------------------------------------------------------------
    # Transfer endpoint — custom rate limit (matches Django-side ratelimit)
    # ---------------------------------------------------------------------------
    location = /api/transfer/ {
        limit_req zone=api burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------------------------------------------------------------------------
    # All other API routes
    # ---------------------------------------------------------------------------
    location / {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://django;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ---------------------------------------------------------------------------
    # Error pages
    # ---------------------------------------------------------------------------
    error_page 429 /429.json;
    location = /429.json {
        default_type application/json;
        return 429 '{"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Too many requests. Please slow down."}}';
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"The service is temporarily unavailable."}}';
    }
}